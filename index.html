<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tipa shkola — Redirecting...</title>
    <script>
        // Простой скрипт для определения языка браузера
        (function() {
            var lang = navigator.language || navigator.userLanguage;
            if (lang.toLowerCase().indexOf('ru') !== -1) {
                window.location.href = "ru/index.html";
            } else {
                window.location.href = "en/index.html";
            }
        })();
    </script>
</head>
<body style="background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <p style="color: #f8fafc; font-family: sans-serif;">Redirecting to your language...</p>
</body>
</html>
